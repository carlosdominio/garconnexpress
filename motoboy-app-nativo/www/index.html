<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Motoboy Express Pro</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css?v=2.0.4">
    <script src="capacitor.js"></script>
    <meta name="theme-color" content="#e67e22">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
            z-index: 2147483647; display: flex; align-items: center; justify-content: center;
        }
        .loading-overlay.hidden { display: none !important; }
        .loading-content { text-align: center; display: flex; flex-direction: column; align-items: center; }
        .spinner-motoboy {
            width: 60px; height: 60px;
            border: 6px solid #fdf2e9; border-top-color: #e67e22; border-radius: 50%;
            animation: spinMotoboy 1s linear infinite; margin-bottom: 15px;
        }
        @keyframes spinMotoboy {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Tela de Carregamento -->
    <div id="loading-app" class="loading-overlay hidden">
        <div class="loading-content">
            <div class="spinner-motoboy"></div>
            <h3 id="loading-text" style="color: #2c3e50; font-size: 1.2rem; font-weight: 800; margin: 0;">Carregando...</h3>
        </div>
    </div>
    
    <header>
        <div style="display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 500px; margin: 0 auto; height: 100%;">
            <h1 style="margin: 0; font-size: 1.2rem; margin-left: 10px;"><i class="fas fa-shipping-fast"></i> MOTOBOY PRO</h1>
            <div style="display: flex; gap: 8px; margin-right: 10px;">
                <button id="btn-toggle-sound" onclick="App.notifications.toggleSound()" class="btn-icon muted" title="Som">
                    <i class="fas fa-bell-slash"></i>
                </button>
                <button onclick="App.logout()" class="btn-icon" title="Sair">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Tela de Login -->
    <div id="login-screen" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: #2c3e50; z-index: 99999; flex-direction: column; align-items: center; justify-content: center; padding: 20px;">
        <div style="width: 100%; max-width: 400px; background: white; padding: 40px 30px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); text-align: center;">
            <div style="font-size: 4rem; margin-bottom: 20px;">🛵</div>
            <h1 style="color: #2c3e50; margin-bottom: 10px; font-weight: 900; font-size: 1.8rem;">Acesso Motoboy</h1>
            <p style="color: #7f8c8d; margin-bottom: 30px; font-weight: 500;">Entre para gerenciar suas entregas</p>
            
            <form id="login-form">
                <div style="margin-bottom: 15px; text-align: left;">
                    <label style="display: block; margin-bottom: 8px; color: #34495e; font-weight: 700; font-size: 0.9rem;">USUÁRIO</label>
                    <input type="text" id="login-user" required style="width: 100%; padding: 18px; border: 2px solid #f1f3f5; background: #f8f9fa; border-radius: 15px; font-size: 1rem; outline: none; font-weight: 600;" placeholder="Seu usuário">
                </div>
                <div style="margin-bottom: 25px; text-align: left;">
                    <label style="display: block; margin-bottom: 8px; color: #34495e; font-weight: 700; font-size: 0.9rem;">SENHA</label>
                    <input type="password" id="login-pass" required style="width: 100%; padding: 18px; border: 2px solid #f1f3f5; background: #f8f9fa; border-radius: 15px; font-size: 1rem; outline: none; font-weight: 600;" placeholder="••••••••">
                </div>
                <button type="submit" id="btn-login-submit" style="width: 100%; background: #e67e22; color: white; border: none; padding: 20px; border-radius: 15px; font-size: 1.1rem; font-weight: 900; cursor: pointer; box-shadow: 0 8px 20px rgba(230,126,34,0.3);">
                    ENTRAR NO APP <i class="fas fa-arrow-right" style="margin-left: 10px;"></i>
                </button>
            </form>
        </div>
    </div>



    <main>
        <div class="section-title">
            <span><i class="fas fa-box-open"></i> PRONTO PARA SAIR</span>
            <span class="badge" id="count-pronto">0</span>
        </div>
        <div id="container-a-caminho" class="pedidos-container"></div>

        <div class="section-title">
            <span><i class="fas fa-clock"></i> EM PREPARO</span>
            <span class="badge" id="count-pendente">0</span>
        </div>
        <div id="container-pendentes" class="pedidos-container"></div>

        <div class="section-title">
            <span><i class="fas fa-check-circle"></i> ENTREGUES HOJE</span>
            <span class="badge" id="count-entregues">0</span>
        </div>
        <div id="container-entregues" class="pedidos-container"></div>
    </main>

    <!-- Modal de Alerta de Cancelamento -->
    <div id="modal-cancelamento" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-icon">🚨</span>
                <h2>PEDIDO CANCELADO!</h2>
            </div>
            <div id="modal-mensagem" class="modal-body">
                O pedido foi cancelado pelo administrador.
            </div>
            <div class="modal-footer">
                <button onclick="document.getElementById('modal-cancelamento').classList.remove('active')" class="btn-fechar-modal">ENTENDIDO</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
    <script src="app.js?v=2.0.4"></script>
</body>
</html>
