<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GarçomExpress - Cozinha</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header id="main-header">
        <div class="header-content">
            <h1>👨‍🍳 Painel da Cozinha</h1>
            <div class="header-controls">
                <div class="toggle-container" style="display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.1); padding: 5px 12px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2);">
                    <span id="label-som" style="color: white; font-size: 0.9rem; font-weight: bold;">SOM</span>
                    <label class="switch">
                        <input type="checkbox" id="check-som" onchange="alternarSom()">
                        <span class="slider"></span>
                    </label>
                </div>
                <div id="status-conexao" class="status-badge">Conectando...</div>
            </div>
        </div>
    </header>

    <div id="closed-screen" style="display: none; height: calc(100vh - 80px); flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center;">
        <div style="background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 500px; width: 100%;">
            <span style="font-size: 5rem; display: block; margin-bottom: 20px;">😴</span>
            <h1 style="color: #2c3e50; margin-bottom: 15px;">Cozinha em Pausa</h1>
            <p style="font-size: 1.1rem; color: #7f8c8d; line-height: 1.6;">O caixa está fechado no momento. A cozinha não está recebendo novos pedidos até que o sistema seja aberto pelo administrador.</p>
        </div>
    </div>

    <main id="pedidos-container">
        <!-- Os pedidos serão inseridos aqui dinamicamente -->
        <div class="loading">Carregando pedidos...</div>
    </main>

    <!-- Modal de Alerta de Cancelamento -->
    <div id="modal-cancelamento" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-icon">⚠️</span>
                <h2>PEDIDO CANCELADO!</h2>
            </div>
            <div id="modal-mensagem" class="modal-body">
                O pedido #X da Mesa Y foi cancelado pelo administrador.
            </div>
            <div class="modal-footer">
                <button onclick="fecharModalCancelamento()" class="btn-fechar-modal">ENTENDIDO</button>
            </div>
        </div>
    </div>

    <script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
    <script src="app.js?v=1.0.4"></script>
</body>
</html>
